version: '3.8'

services:
  traefik:
    image: traefik:v3.1
    container_name: traefik
    ports:
      - "80:80"
      - "443:443"
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.leresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.leresolver.acme.email=your-email@example.com"
      - "--certificatesresolvers.leresolver.acme.storage=/letsencrypt/acme.json"
    volumes:
      - "./letsencrypt:/letsencrypt"
      - "/var/run/docker.sock:/var/run/docker.sock"

  api-eventlogger:
    image: my_eventlogger_image:latest
    container_name: api-eventlogger
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-eventlogger.rule=Host(`eventlogger.local`)"
      - "traefik.http.services.api-eventlogger.loadbalancer.server.port=5000"
      - "traefik.http.routers.api-eventlogger.entrypoints=web,websecure"
      - "traefik.http.routers.api-eventlogger.tls=true"
      - "traefik.http.routers.api-eventlogger.tls.certresolver=leresolver"
    depends_on:
      - traefik
    environment:
      - FLASK_ENV=development

  api-fbanalyze:
    image: my_fbanalyze_image:latest
    container_name: api-fbanalyze
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-fbanalyze.rule=Host(`fbanalyze.local`)"
      - "traefik.http.services.api-fbanalyze.loadbalancer.server.port=5001"
      - "traefik.http.routers.api-fbanalyze.entrypoints=web,websecure"
      - "traefik.http.routers.api-fbanalyze.tls=true"
      - "traefik.http.routers.api-fbanalyze.tls.certresolver=leresolver"
    depends_on:
      - traefik
    environment:
      - FLASK_ENV=development

  mongodb:
    image: mongo:5.0
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongodb_data:/data/db 

  mongo-express:
    image: mongo-express
    container_name: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: example
      ME_CONFIG_MONGODB_URL: mongodb://root:example@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongodb

volumes:
  mongodb_data:
  letsencrypt:
